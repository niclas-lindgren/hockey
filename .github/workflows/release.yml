name: Build and release desktop app

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            electron-target: mac
            artifact-name: RVV-Miniputt-mac.dmg
            artifact-path: apps/desktop/dist/*.dmg

          - os: windows-latest
            electron-target: win
            artifact-name: RVV-Miniputt-win.exe
            artifact-path: apps/desktop/dist/*.exe

          - os: ubuntu-latest
            electron-target: linux
            artifact-name: RVV-Miniputt-linux.AppImage
            artifact-path: apps/desktop/dist/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # keyring backends per platform
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            pip install keyring
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pip install keyring
          fi

      - name: Build Python backend (PyInstaller)
        shell: bash
        run: |
          PYTHON_BIN="python3"
          # Windows uses python, not python3
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            PYTHON_BIN="python"
          fi
          EXTRA=""
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            EXTRA="--hidden-import keyring.backends.macOS"
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXTRA="--hidden-import keyring.backends.Windows"
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            EXTRA="--hidden-import keyring.backends.SecretService"
          fi
          $PYTHON_BIN -m PyInstaller \
            --name rvv-miniputt-backend \
            --clean \
            --noconfirm \
            --collect-all tournament_scheduler \
            $EXTRA \
            --distpath dist/desktop-backend \
            --workpath build/desktop-backend \
            tournament_scheduler/desktop_server.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Node dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        run: |
          echo "## RVV Miniputt Desktop ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### What's new" >> RELEASE_NOTES.md
          echo "- See the commit log for changes in this release." >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Installation" >> RELEASE_NOTES.md
          echo "- **macOS**: Mount the .dmg and drag RVV Miniputt to Applications." >> RELEASE_NOTES.md
          echo "- **Windows**: Run the installer (.exe)." >> RELEASE_NOTES.md
          echo "- **Linux**: Make the .AppImage executable and run it." >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "> [!NOTE]" >> RELEASE_NOTES.md
          echo "> On first run, go to **Pålogging og KI-assistent**, set up a KI-leverandør," >> RELEASE_NOTES.md
          echo "> and download the Chromium browser in the **Kalenderskraping** section" >> RELEASE_NOTES.md
          echo "> to enable calendar scraping for all sources." >> RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "RVV Miniputt ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          files: |
            *.dmg
            *.exe
            *.AppImage
          generate_release_notes: true

name: Secret scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest detect \
              --source=/repo \
              --config=/repo/.gitleaks.toml \
              --redact \
              --no-banner

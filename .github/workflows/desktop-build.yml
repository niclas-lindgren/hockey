name: Build desktop app

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "tournament_scheduler/**"
      - "scripts/package-desktop-backend.sh"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/desktop-build.yml"

jobs:
  macos:
    name: macOS app
    runs-on: macos-14
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      PLAYWRIGHT_BROWSERS_PATH: "0"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Python project
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e '.[desktop]'
          python -m playwright install chromium

      - name: Build bundled Python backend
        run: scripts/package-desktop-backend.sh

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build unsigned macOS desktop app
        working-directory: apps/desktop
        run: npm run dist -- --mac dmg zip

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rvv-miniputt-macos-unsigned
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/latest-mac.yml
          if-no-files-found: error

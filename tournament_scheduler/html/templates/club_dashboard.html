<!-- Static club summary for the report page -->
<section class="club-dashboard" id="clubSummary">
  <div class="section-head">
    <div>
      <p class="eyebrow">Klubber</p>
      <h2><span class="club-dash-icon">$ICON_TARGET$</span> Klubbstatus</h2>
    </div>
    <p class="section-note">Kompakt oversikt som kan gjenbrukes i andre visninger.</p>
  </div>
  <div class="table-wrap">
    <table class="club-summary-table">
      <thead>
        <tr>
          <th>Klubb</th>
          <th>Lag</th>
          <th>Hjemmeturneringer</th>
          <th>Borteturneringer</th>
          <th>Reise (km)</th>
        </tr>
      </thead>
      <tbody id="clubSummaryBody">
        <tr><td colspan="5" class="empty-cell">Ingen klubbdata tilgjengelig</td></tr>
      </tbody>
    </table>
  </div>
</section>

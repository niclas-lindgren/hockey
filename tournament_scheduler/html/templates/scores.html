<!-- Scores -->
<div class="score-bar">
  <span class="score-item" title="Andel av hvert lags mulige motstandere (samme aldersgruppe, annen klubb) som de faktisk har møtt denne sesongen">
    <span class="score-dot" style="background:var(--accent)"></span>
    Spredning (motstandervariasjon): <strong>$DIVERSITY_SCORE$%</strong>
  </span>
  <span class="score-item">
    <span class="score-dot" style="background:var(--emerald)"></span>
    Manedsbalanse: <strong>$MONTH_BALANCE_SCORE$%</strong>
  </span>
  <span class="score-item" title="Andel planlagte kamper som er forste gang de to lagene moter hverandre denne sesongen">
    <span class="score-dot" style="background:var(--amber)"></span>
    Nye matchups (ferske motstanderpar): <strong>$PAIRWISE_SCORE$%</strong>
  </span>
  <span class="score-item">
    <span class="score-dot" style="background:var(--rose)"></span>
    Kamper per lag: <strong>$GAME_COUNT_SPREAD$</strong>
  </span>
</div>
